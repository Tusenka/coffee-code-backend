trigger-helm-update:
  stage: notify-helm
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  tags: [kubernetes, yandex-cloud]
  image: alpine/curl
  dependencies: []
  script:
    - >
      curl --fail --request POST
      --form "token=$HELM_TRIGGER_TOKEN"
      --form "ref=main"
      --form "variables[APP_VERSION]=$CI_COMMIT_SHA"
      --form "variables[VALUES_FILE_PATH]=coffee-and-code-backend/Chart.yaml"
      "https://gitlab.com/api/v4/projects/77043097/trigger/pipeline"
