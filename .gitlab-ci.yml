stages:
  - sast
  - build
  - test
  - notify-helm

variables: {PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip/}

default:
  cache:
    key: cache-key
    paths: [.cache/pip/]
    when: always

sast:
  stage: sast
include:
  - template: Security/SAST.gitlab-ci.yml

build_image:
  stage: build
  image: moby/buildkit:rootless # docker:24.0.6 # Use a Docker image that includes the Docker CLI
  tags: [kubernetes, yandex-cloud]
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
    CACHE_IMAGE: $CI_REGISTRY_IMAGE:cache
  before_script:
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > ~/.docker/config.json
  script:
    - >
      buildctl-daemonless.sh build
      --frontend dockerfile.v0
      --local context=.
      --local dockerfile=.
      --opt platform=linux/amd64
      --export-cache type=registry,ref=$CACHE_IMAGE
      --import-cache type=registry,ref=$CACHE_IMAGE
      --output type=image,name=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA,push=true


